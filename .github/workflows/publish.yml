name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-sanctum-lst-list-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: ts

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: ts/package-lock.json

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Validate release ref
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"

          if ! git merge-base --is-ancestor HEAD "origin/${DEFAULT_BRANCH}"; then
            echo "Release commit must be on origin/${DEFAULT_BRANCH}" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${VERSION}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${VERSION}" >&2
            exit 1
          fi

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} already exists on npm" >&2
            exit 1
          fi

      - name: Build package
        run: npm run build

      - name: Dry-run pack
        run: npm pack --dry-run --json > npm-pack-dry-run.json

      - name: Upload pack manifest
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-dry-run
          path: ts/npm-pack-dry-run.json

      - name: Publish
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          DIST_TAG="latest"

          if [[ "${VERSION}" == *"-test"* ]]; then
            DIST_TAG="test"
          fi

          npm publish --access public --provenance --tag "${DIST_TAG}"

      - name: Verify published signatures
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          TMP_DIR="$(mktemp -d)"

          cd "${TMP_DIR}"
          npm init -y

          for attempt in {1..10}; do
            if npm install "${PACKAGE_NAME}@${VERSION}"; then
              break
            fi

            if [[ "${attempt}" == "10" ]]; then
              exit 1
            fi

            sleep 15
          done

          npm audit signatures
